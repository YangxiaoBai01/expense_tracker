<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">💰 Expense Tracker</h1>

    <!-- Add Expense Card -->
    <div class="card mb-4">
        <div class="card-header">Add New Expense</div>
        <div class="card-body">
            <form action="/add" method="post" class="row g-2">
                <div class="col-md-2">
                    <input type="number" name="amount" class="form-control" placeholder="Amount" required>
                </div>
                <div class="col-md-2">
                    <select name="currency" class="form-select">
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                        <option value="EUR">EUR</option>
                        <option value="JPY">JPY</option>
                        <option value="GBP">GBP</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" name="category" class="form-control" placeholder="Category" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="note" class="form-control" placeholder="Note" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Expense List Card -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Expenses</span>
            <a href="/summary" class="btn btn-sm btn-outline-secondary">View Summary</a>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody>
                {% for e in expenses %}
                    <tr>
                        <td>{{ e.category }}</td>
                        <td>${{ e.amount }}</td>
                        <td>{{ e.note }}</td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
